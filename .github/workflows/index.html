<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ant Adventures — Mini CRM 2026</title>
<meta http-equiv="refresh" content="0; url=TAD_MiniCRM_2026.html">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #12291e;
    color: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .splash {
    text-align: center;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .ant { font-size: 52px; margin-bottom: 16px; display: block; }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #7dd3a8;
    letter-spacing: 0.4px;
    margin-bottom: 6px;
  }
  p {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 28px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(125,211,168,0.2);
    border-top-color: #7dd3a8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fallback {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    margin-top: 20px;
  }
  .fallback a {
    color: #7dd3a8;
    text-decoration: none;
    font-weight: 600;
  }
  .fallback a:hover { text-decoration: underline; }
  .version {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10.5px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.8px;
  }
</style>
</head>
<body>
<div class="splash">
  <span class="ant">🐜</span>
  <h1>The Ant Adventures</h1>
  <p>Mini CRM 2026</p>
  <div class="spinner"></div>
  <div class="fallback">
    Not redirecting? <a href="TAD_MiniCRM_2026.html">Open CRM →</a>
  </div>
</div>
<div class="version">TAD · MINI CRM · 2026</div>
<script>
  // Instant redirect — meta refresh is backup
  window.location.replace('TAD_MiniCRM_2026.html');
</script>
</body>
</html>
